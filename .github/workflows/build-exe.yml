name: Build standalone executables

on:
  release:
    types: [published]

permissions:
  contents: write          # needed to upload release assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: parliament-windows-x64.exe
            exe_name: parliament.exe
          - os: ubuntu-latest
            artifact: parliament-linux-x64
            exe_name: parliament
          - os: macos-latest
            artifact: parliament-macos-x64
            exe_name: parliament

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build executable
        run: python scripts/build-exe.py

      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.exe_name }}" "dist/${{ matrix.artifact }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
